openapi: 3.0.3
info:
  title: Morincum バックエンドAPI
  description: |
    配当金管理アプリ「Morincum」のバックエンドAPIです。

    ## 認証方式

    ### cognitoAuth（ログイン済みユーザー）
    Cognito JWTトークンを使用します。
    `Authorization: Bearer <access_token>` ヘッダーに設定してください。

    ### guestAuth（未ログインユーザー）
    Cognito Identity Poolが発行する匿名トークンを使用します。
    アプリ起動時に自動で発行されます。
    stocks系エンドポイントのみアクセス可能です。

    ### iamAuth（バッチ処理・内部API）
    AWS SigV4署名による認証です。Morincum-batchからの呼び出し専用です。

    ## Morincum-batchとの役割分担
    - Claude API・Slack Bot・X API連携は Morincum-batch が担当
    - バックエンドはデータの保存・取得APIの提供のみ行う
    - バッチはInternal API（iamAuth）経由でRDSを操作する

    ## 多言語対応
    `locale` パラメータで `ja`（日本語）または `en`（英語）を指定できます。
    省略時はユーザーの `preferred_locale` 設定が適用されます。

    ## エラーレスポンス
    全エンドポイント共通のエラー形式を返します。
  version: 1.11.0
  contact:
    name: Morincum開発チーム

servers:
  - url: https://api.morincum.com/v1
    description: 本番環境
  - url: https://api-staging.morincum.com/v1
    description: ステージング環境
  - url: https://api-dev.morincum.com/v1
    description: 開発環境

tags:
  - name: auth
    description: 認証・セッション管理
  - name: users
    description: ユーザー管理
  - name: portfolio
    description: ポートフォリオ集計
  - name: surveys
    description: アンケート
  - name: terms
    description: 利用規約・同意管理
  - name: notifications
    description: お知らせ・ニュース・メンテナンス配信
  - name: maintenance
    description: メンテナンス状態確認
  - name: stocks
    description: 銘柄マスタ
  - name: logs
    description: 行動ログ送信
  - name: internal
    description: |
      内部バッチ処理用API（IAM認証）
      Morincum-batchからの呼び出し専用です。
      Cognitoトークンではなく、AWS SigV4署名による認証を使用します。
      フロントエンドからはアクセスできません。
  - name: stats
    description: バッチ向け統計取得API（IAM認証）
  - name: news
    description: AIニュース管理API（IAM認証）
  - name: xposts
    description: X投稿管理API（IAM認証）
  - name: versions
    description: アプリバージョン確認API

security:
  - cognitoAuth: []

paths:

  # ==========================================
  # 認証
  # ==========================================

  /auth/signup:
    post:
      tags: [auth]
      summary: ユーザー登録
      description: 新規ユーザーをCognitoに登録します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  example: Password123!
      responses:
        '200':
          description: 登録成功。確認メールを送信しました。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 確認メールを送信しました
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/confirm:
    post:
      tags: [auth]
      summary: メールアドレス確認
      description: 登録メールに届いた確認コードを検証します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  example: '123456'
      responses:
        '200':
          description: 確認成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: メールアドレスを確認しました
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/signin:
    post:
      tags: [auth]
      summary: ログイン
      description: メールアドレスとパスワードでログインします。MFAが有効な場合は追加の認証ステップが必要です。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: ログイン成功またはMFA認証が必要
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthTokens'
                  - $ref: '#/components/schemas/MfaChallenge'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/mfa/verify:
    post:
      tags: [auth]
      summary: MFA認証
      description: TOTPコードを検証してログインを完了します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session, code]
              properties:
                session:
                  type: string
                  description: サインインレスポンスのsessionトークン
                code:
                  type: string
                  description: 認証アプリの6桁コード
                  example: '123456'
      responses:
        '200':
          description: MFA認証成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [auth]
      summary: トークンリフレッシュ
      description: リフレッシュトークンを使用してアクセストークンを更新します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: トークン更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/signout:
    post:
      tags: [auth]
      summary: ログアウト
      description: グローバルサインアウトを実行します。全デバイスのセッションが無効化されます。
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: ログアウトしました
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password/reset/request:
    post:
      tags: [auth]
      summary: パスワードリセット要求
      description: パスワードリセット用のコードをメールで送信します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: リセットメール送信成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: パスワードリセットメールを送信しました

  /auth/password/reset/confirm:
    post:
      tags: [auth]
      summary: パスワードリセット確定
      description: コードと新しいパスワードでリセットを完了します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, new_password]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: パスワードリセット成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: パスワードをリセットしました
        '400':
          $ref: '#/components/responses/BadRequest'

  # ==========================================
  # ユーザー管理
  # ==========================================

  /users/me:
    get:
      tags: [users]
      summary: 自分のプロフィール取得
      description: ログイン中のユーザー情報を取得します。
      responses:
        '200':
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [users]
      summary: プロフィール更新
      description: ユーザーの属性情報を更新します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                age_range:
                  type: string
                  enum: [10代, 20代, 30代, 40代, 50代, 60代以上]
                investment_experience:
                  type: string
                  enum: [1年未満, 1〜3年, 3〜5年, 5〜10年, 10年以上]
                preferred_locale:
                  type: string
                  enum: [ja, en]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [users]
      summary: アカウント削除
      description: ユーザーアカウントを削除します。この操作は取り消せません。
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: アカウントを削除しました
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # プラン情報
  # ==========================================

  /user/plan:
    get:
      tags: [users]
      summary: プラン情報取得
      description: |
        現在のプラン情報を返します。
        - `plan_id: 'standard'` → is_premium = true（有料ユーザー）
        - `plan_id: 'free'` → is_premium = false（無料ユーザー）
      security:
        - cognitoAuth: []
      responses:
        '200':
          description: プラン情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/plan/downgrade-message-shown:
    put:
      tags: [users]
      summary: ダウングレードメッセージ表示済みマーク
      description: |
        ダウングレード通知モーダルを閉じた際に呼び出します。
        `users.has_shown_downgrade_message` を `true` に更新します。
        以降は同じユーザーに対してモーダルを再表示しません。
      security:
        - cognitoAuth: []
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================
  # サブスクリプション（RevenueCat Webhook）
  # ==========================================

  /webhooks/revenuecat:
    post:
      tags: [users]
      summary: RevenueCat Webhook受信
      description: |
        RevenueCatからのサブスクリプション状態変更イベントを受信します。
        購入・解約・返金・更新イベントを処理してusersテーブルのis_premiumを更新します。

        ## 受信するイベント
        - `INITIAL_PURCHASE`：初回購入 → is_premium = true
        - `RENEWAL`：更新 → is_premium = true（継続）
        - `CANCELLATION`：解約 → is_premium = false
        - `EXPIRATION`：有効期限切れ → is_premium = false
        - `REFUND`：返金 → is_premium = false

        ## 認証
        RevenueCatのWebhook Secretをヘッダーで検証します。
        SSMパラメータ：`/morincum/revenuecat/webhook-secret`
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          description: RevenueCat Webhook Secret
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [INITIAL_PURCHASE, RENEWAL, CANCELLATION, EXPIRATION, REFUND]
                    app_user_id:
                      type: string
                      description: CognitoのユーザーID（sub）
      responses:
        '200':
          description: 処理成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # ポートフォリオ集計
  # ==========================================

  /portfolio/summary:
    get:
      tags: [portfolio]
      summary: ポートフォリオ集計取得
      description: ユーザーの配当金合計・業界割合・資産種別割合を取得します。
      responses:
        '200':
          description: ポートフォリオ集計
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [portfolio]
      summary: ポートフォリオ集計更新
      description: |
        アプリ側で計算した集計値をサーバーに保存します。
        フロントエンドの `portfolio_summary` テーブルの値を送信してください。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [total_annual_dividend, sector_breakdown, asset_type_breakdown]
              properties:
                total_annual_dividend:
                  type: number
                  description: 年間配当金合計（円）
                  example: 150000
                sector_breakdown:
                  type: object
                  description: 業界別割合（%）
                  example:
                    金融: 35
                    テック: 25
                    商社: 20
                    娯楽: 20
                asset_type_breakdown:
                  type: object
                  description: |
                    資産種別の配当金内訳（円）。
                    フロントエンドの portfolio_summary テーブルの以下カラムと対応：
                    - jp_dividend_total
                    - us_dividend_total
                    - trust_dividend_total
                  properties:
                    jp_dividend_total:
                      type: number
                      description: 日本株 配当金合計（円）
                      example: 80000
                    us_dividend_total:
                      type: number
                      description: 米国株 配当金合計（円換算）
                      example: 45000
                    trust_dividend_total:
                      type: number
                      description: 投資信託 分配金合計（円）
                      example: 25000
                  example:
                    jp_dividend_total: 80000
                    us_dividend_total: 45000
                    trust_dividend_total: 25000
                holdings_snapshot:
                  type: array
                  description: 保有銘柄スナップショット
                  items:
                    type: object
                    properties:
                      ticker:
                        type: string
                      shares:
                        type: integer
                      account_type:
                        type: string
                        enum: [nisa, tsumitate, tokutei]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /portfolio/history:
    get:
      tags: [portfolio]
      summary: ポートフォリオ履歴取得
      description: 月次の配当金合計推移を取得します。
      parameters:
        - name: months
          in: query
          description: 取得する月数（デフォルト12）
          schema:
            type: integer
            default: 12
            maximum: 60
      responses:
        '200':
          description: ポートフォリオ履歴
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        recorded_month:
                          type: string
                          format: date
                          example: '2026-03-01'
                        total_annual_dividend:
                          type: number
                          example: 150000
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # アンケート
  # ==========================================

  /surveys/active:
    get:
      tags: [surveys]
      summary: 有効なアンケート取得
      description: 現在有効なアンケートと設問一覧を取得します。
      parameters:
        - $ref: '#/components/parameters/locale'
      responses:
        '200':
          description: アンケート情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Survey'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /surveys/{survey_id}/answers:
    post:
      tags: [surveys]
      summary: アンケート回答送信
      description: アンケートへの回答を送信します。
      parameters:
        - name: survey_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    required: [question_id, answer]
                    properties:
                      question_id:
                        type: string
                        format: uuid
                      answer:
                        description: 回答内容（単一選択・複数選択・自由入力に対応）
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: string
      responses:
        '201':
          description: 回答送信成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 回答を受け付けました
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 既に回答済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # 利用規約・同意管理
  # ==========================================

  /terms/active:
    get:
      tags: [terms]
      summary: 有効な利用規約・ポリシー取得
      description: |
        現在有効な利用規約とプライバシーポリシーを取得します。
        フロントエンドの `legal_agreements.terms_version` / `policy_version` の確認に使用します。
      security: []
      parameters:
        - $ref: '#/components/parameters/locale'
      responses:
        '200':
          description: 利用規約・ポリシー
          content:
            application/json:
              schema:
                type: object
                properties:
                  terms:
                    $ref: '#/components/schemas/Terms'
                    description: 利用規約（type=terms）
                  policy:
                    $ref: '#/components/schemas/Terms'
                    description: プライバシーポリシー（type=policy）
                  disclaimer:
                    $ref: '#/components/schemas/Terms'
                    description: 免責事項（type=disclaimer）。株価データの非公式性・投資判断はユーザー責任
              example:
                terms:
                  id: "uuid-xxx"
                  version: "v1.2"
                  type: "terms"
                  title: "利用規約"
                  s3_url: "https://s3.ap-northeast-1.amazonaws.com/morincum-assets/terms/v1.2/ja.pdf"
                policy:
                  id: "uuid-yyy"
                  version: "v1.0"
                  type: "policy"
                  title: "プライバシーポリシー"
                  s3_url: "https://s3.ap-northeast-1.amazonaws.com/morincum-assets/policy/v1.0/ja.pdf"
                disclaimer:
                  id: "uuid-zzz"
                  version: "v1.0"
                  type: "disclaimer"
                  title: "免責事項"
                  s3_url: "https://s3.ap-northeast-1.amazonaws.com/morincum-assets/disclaimer/v1.0/ja.pdf"

  /terms/consent:
    post:
      tags: [terms]
      summary: 利用規約・ポリシーへの同意
      description: |
        利用規約とプライバシーポリシーへの同意を記録します。
        フロントエンドの `legal_agreements` テーブルへの保存と同時に呼び出してください。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [terms_id, policy_id, disclaimer_id]
              properties:
                terms_id:
                  type: string
                  format: uuid
                  description: 同意した利用規約のID
                policy_id:
                  type: string
                  format: uuid
                  description: 同意したプライバシーポリシーのID
                disclaimer_id:
                  type: string
                  format: uuid
                  description: 同意した免責事項のID
      responses:
        '201':
          description: 同意記録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 利用規約に同意しました
                  agreed_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /terms/consent/status:
    get:
      tags: [terms]
      summary: 同意状態確認
      description: 最新の利用規約に同意済みかどうかを確認します。
      responses:
        '200':
          description: 同意状態
          content:
            application/json:
              schema:
                type: object
                properties:
                  agreed:
                    type: boolean
                    example: true
                  terms_version:
                    type: string
                    example: v1.2
                  agreed_at:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # お知らせ・ニュース・メンテナンス配信
  # ==========================================

  /notifications:
    get:
      tags: [notifications]
      summary: お知らせ・ニュース一覧取得
      description: |
        メンテナンス・お知らせ・AIニュースをまとめて取得します。
        フロントエンドは15分ごとにポーリングしてください。
        `since` パラメータで前回取得以降の新着のみ取得できます。
      parameters:
        - $ref: '#/components/parameters/locale'
        - name: since
          in: query
          description: この日時以降の新着のみ取得（ISO8601形式）
          schema:
            type: string
            format: date-time
            example: '2026-03-18T10:00:00Z'
      responses:
        '200':
          description: お知らせ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # メンテナンス状態確認
  # ==========================================

  /maintenance/active:
    get:
      tags: [maintenance]
      summary: メンテナンス状態確認
      description: |
        現在メンテナンス中かどうかを確認します。
        アプリ起動時・5分ごとのポーリングで呼び出してください。
      security: []
      parameters:
        - $ref: '#/components/parameters/locale'
      responses:
        '200':
          description: メンテナンス状態
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceStatus'

  # ==========================================
  # 銘柄マスタ
  # ==========================================

  /guest/stocks:
    get:
      tags: [stocks]
      summary: 銘柄一覧取得
      description: 銘柄マスタの一覧を取得します。検索・フィルタリングが可能です。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - $ref: '#/components/parameters/locale'
        - name: q
          in: query
          description: 銘柄名・ティッカーで検索
          schema:
            type: string
            example: 三菱
        - name: market
          in: query
          description: 市場でフィルタ
          schema:
            type: string
            enum: [TSE, NYSE, NASDAQ]
        - name: sector
          in: query
          description: 業種でフィルタ
          schema:
            type: string
            example: 金融
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: updated_after
          in: query
          description: この日時以降にバックエンドマスタが更新された銘柄のみ取得（差分同期用）
          schema:
            type: string
            format: date-time
            example: '2026-04-01T00:00:00Z'
      responses:
        '200':
          description: 銘柄一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  stocks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Stock'
                  total:
                    type: integer
                    example: 250
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guest/stocks/{ticker}:
    get:
      tags: [stocks]
      summary: 銘柄詳細取得
      description: 指定した銘柄の詳細情報・配当履歴・株主優待を取得します。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          description: 銘柄コード（例：8058、AAPL）
          schema:
            type: string
            example: '8058'
        - $ref: '#/components/parameters/locale'
      responses:
        '200':
          description: 銘柄詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guest/stocks/{ticker}/dividends:
    get:
      tags: [stocks]
      summary: 配当金履歴取得
      description: 指定した銘柄の配当金履歴を取得します。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        '200':
          description: 配当金履歴
          content:
            application/json:
              schema:
                type: object
                properties:
                  dividends:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockDividend'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guest/stocks/{ticker}/benefits:
    get:
      tags: [stocks]
      summary: 株主優待取得
      description: 指定した銘柄の株主優待情報を取得します。株数別のtier情報を含みます。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/locale'
      responses:
        '200':
          description: 株主優待情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  benefits:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockBenefit'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guest/stocks/{ticker}/prices:
    get:
      tags: [stocks]
      summary: 株価履歴取得
      security:
        - cognitoAuth: []
        - guestAuth: []
      description: |
        指定した銘柄の株価履歴（OHLCV）を取得します。
        日足データを返します。
      parameters:
        - name: ticker
          in: path
          required: true
          description: 銘柄コード（例：8058、AAPL）
          schema:
            type: string
            example: '8058'
        - name: from
          in: query
          description: 取得開始日（ISO8601形式）
          schema:
            type: string
            format: date
            example: '2026-01-01'
        - name: to
          in: query
          description: 取得終了日（ISO8601形式）
          schema:
            type: string
            format: date
            example: '2026-03-24'
        - name: limit
          in: query
          description: 取得件数（デフォルト30、最大365）
          schema:
            type: integer
            default: 30
            maximum: 365
      responses:
        '200':
          description: 株価履歴
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                    example: '8058'
                  currency:
                    type: string
                    example: JPY
                  prices:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockPrice'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guest/stocks/{ticker}/prices/latest:
    get:
      tags: [stocks]
      summary: 最新株価取得
      description: 指定した銘柄の最新終値・前日比を取得します。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
            example: '8058'
      responses:
        '200':
          description: 最新株価
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockPriceLatest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # ==========================================
  # 銘柄ウォッチ（株価取得対象の管理）
  # ==========================================

  /guest/stocks/{ticker}/watch:
    post:
      tags: [stocks]
      summary: 銘柄ウォッチ登録（1件）
      description: |
        銘柄追加画面で銘柄を追加したタイミングで呼び出します。
        watched_tickersテーブルに登録され、次回バッチ実行時から株価取得対象になります。
        重複登録は無視されます（冪等）。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          example: '8058'
      responses:
        '200':
          description: 登録成功（または既に登録済み）
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                    example: '8058'
                  added_at:
                    type: string
                    format: date-time
                  watcher_count:
                    type: integer
                    description: 保有ユーザー数
                    example: 1
    delete:
      tags: [stocks]
      summary: 銘柄ウォッチ解除（1件）
      description: |
        銘柄削除時に呼び出します。
        watcher_countを-1します。0になっても削除しません（ネタコンテンツとして活用）。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
          example: '8058'
      responses:
        '200':
          description: 解除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                    example: '8058'
                  watcher_count:
                    type: integer
                    description: 解除後のwatcher_count（0以下にはならない）
                    example: 0
        '404':
          $ref: '#/components/responses/NotFound'

  /guest/stocks/watch/bulk:
    post:
      tags: [stocks]
      summary: 銘柄ウォッチ一括登録（CSVインポート用）
      description: |
        CSVインポート時に大量の銘柄を一括登録します。
        watched_tickersテーブルに一括INSERTします（重複時はwatcher_countをインクリメント）。
        最大1,000件まで受け付けます。
      security:
        - cognitoAuth: []
        - guestAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tickers]
              properties:
                tickers:
                  type: array
                  items:
                    type: string
                  maxItems: 1000
                  example: ["8058", "7203", "AAPL", "MSFT"]
      responses:
        '200':
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    description: 新規登録件数
                    example: 4
                  incremented:
                    type: integer
                    description: 既存銘柄のwatcher_countをインクリメントした件数
                    example: 1
                  total_watchers:
                    type: object
                    description: 登録後のwatcher_count（ticker→count）
                    example: {"8058": 3, "7203": 1}
        '400':
          $ref: '#/components/responses/BadRequest'

  /guest/stocks/watch/reset:
    post:
      tags: [stocks]
      summary: 銘柄ウォッチ一括解除（全削除・初期化用）
      description: |
        以下のタイミングで呼び出します。
        - 設定画面「すべての銘柄を削除」ボタン
        - アプリ初期化（全データ削除）

        指定した全銘柄のwatcher_countを-1します。
        0になっても削除しません（ネタコンテンツとして活用）。
      security:
        - cognitoAuth: []
        - guestAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tickers]
              properties:
                tickers:
                  type: array
                  description: 解除する銘柄コードの一覧（保有していた全銘柄）
                  items:
                    type: string
                  maxItems: 1000
                  example: ["8058", "7203", "AAPL"]
      responses:
        '200':
          description: 解除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  decremented:
                    type: integer
                    description: watcher_countをデクリメントした件数
                    example: 3
        '400':
          $ref: '#/components/responses/BadRequest'

  # ==========================================
  # 為替レート
  # ==========================================

  /guest/fx/latest:
    get:
      tags: [stocks]
      summary: 最新為替レート取得
      description: |
        最新のUSD/JPY為替レートを取得します。

        ## フロントエンドとの連携
        フロントエンドの `app_settings.usd_jpy` の更新に使用します。
        アプリ起動時・バックグラウンドからの復帰時に呼び出してください。

        バッチ（fx-rate-batch）がECB APIから取得した公式レートを返します。
        フロントが直接ECB APIを呼ぶ必要はありません。
      security:
        - cognitoAuth: []
        - guestAuth: []
      responses:
        '200':
          description: 最新為替レート
          content:
            application/json:
              schema:
                type: object
                properties:
                  usd_jpy:
                    type: number
                    description: USD/JPYレート
                    example: 149.5
                  updated_at:
                    type: string
                    format: date-time
                    description: ECBからの取得日時
                    example: '2026-03-25T09:00:00Z'
              example:
                usd_jpy: 149.5
                updated_at: '2026-03-25T09:00:00Z'

  # ==========================================
  # 内部バッチ処理用API（IAM認証・VPC内専用）
  # ==========================================

  /guest/versions/latest:
    get:
      tags: [versions]
      summary: 最新アプリバージョン取得
      description: |
        最新のアプリバージョン情報を取得します。
        無料・有償ユーザー問わず利用可能です。

        ## フロントエンドとの連携
        アプリ起動時に呼び出し、`min_required_version` と現在インストール済みのバージョンを比較して
        強制アップデートの要否を判定してください。

        `os` パラメータを指定すると、そのOSの最新バージョンを `latest_version` に返します。
        省略すると全体の最新バージョンを返します。
      security:
        - cognitoAuth: []
        - guestAuth: []
      parameters:
        - name: os
          in: query
          required: false
          schema:
            type: string
            enum: [ios, android, all]
          description: 対象OS（省略時は全体の最新バージョンを返す）
          example: ios
      responses:
        '200':
          description: 最新バージョン情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionLatest'
              examples:
                レスポンス例:
                  value:
                    latest_version: '1.1.0'
                    min_required_version: '1.0.0'
                    store_url_ios: 'https://apps.apple.com/app/morincum/id0000000000'
                    store_url_android: 'https://play.google.com/store/apps/details?id=com.morincum'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/stocks/watched:
    get:
      tags: [internal]
      summary: watcher_countランキング取得
      description: |
        watcher_countの統計情報を返します。
        バッチの株価取得対象は stocks 全件です（watched_tickersによる絞り込みは行いません）。

        ## 用途
        - 人気銘柄ランキング（watcher_count上位）
        - 「誰にも選ばれていない銘柄」コンテンツ（watcher_count=0）
        - X投稿生成・ニュース生成バッチのネタデータ取得
      security:
        - iamAuth: []
      parameters:
        - name: order
          in: query
          schema:
            type: string
            enum: [desc, asc]
            default: desc
          description: desc=人気順（上位ランキング）/ asc=不人気順（底辺ランキング）
        - name: market
          in: query
          schema:
            type: string
            enum: [JP, US]
          description: 市場区分（省略時は全市場）
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        '200':
          description: watcher_countランキング
          content:
            application/json:
              schema:
                type: object
                properties:
                  rankings:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                          example: '8058'
                        name_ja:
                          type: string
                          example: 三菱商事
                        watcher_count:
                          type: integer
                          example: 42
                  total_watched:
                    type: integer
                    description: watcher_count > 0 の銘柄数
                    example: 312
                  total_unwatched:
                    type: integer
                    description: watcher_count = 0 の銘柄数
                    example: 11179
        '403':
          $ref: '#/components/responses/Forbidden'

  /internal/batch/prices:
    post:
      tags: [internal]
      summary: 株価（OHLCV）一括登録
      description: |
        Pythonバッチが取得した日本株・米国株の株価（始値・高値・安値・終値・出来高）をS3経由で登録します。
        バッチはS3にJSONをPUTした後、このエンドポイントにS3キーを渡してください。
        バックエンドがS3からJSONを取得してRDSに書き込みます。

        S3に置くJSONのフォーマット：
        ```json
        {
          "price_date": "2026-03-24",
          "prices": [
            {
              "ticker": "8058",
              "open": 3200,
              "high": 3280,
              "low": 3190,
              "close": 3240,
              "adjusted_close": 3240,
              "volume": 1250000,
              "currency": "JPY"
            }
          ]
        }
        ```
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [s3_key, price_date]
              properties:
                s3_key:
                  type: string
                  description: S3バケット内のJSONファイルパス
                  example: prices/2026-03-24.json
                price_date:
                  type: string
                  format: date
                  description: 取得対象日
                  example: '2026-03-24'
            example:
              s3_key: prices/2026-03-24.json
              price_date: '2026-03-24'
      responses:
        '200':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /internal/batch/dividends:
    post:
      tags: [internal]
      summary: 配当情報一括登録
      description: |
        Pythonバッチが取得した日本株・米国株の配当情報をS3経由で登録します。
        バッチはS3にJSONをPUTした後、このエンドポイントにS3キーを渡してください。
        バックエンドがS3からJSONを取得してRDSに書き込みます。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [s3_key, fetched_date]
              properties:
                s3_key:
                  type: string
                  description: S3バケット内のJSONファイルパス
                  example: dividends/2026-03-24.json
                fetched_date:
                  type: string
                  format: date
                  description: 取得実行日
                  example: '2026-03-24'
            example:
              s3_key: dividends/2026-03-24.json
              fetched_date: '2026-03-24'
      responses:
        '200':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /internal/batch/fund-prices:
    post:
      tags: [internal]
      summary: 投資信託基準価額・分配金一括登録
      description: |
        Pythonバッチが取得した投資信託の基準価額・純資産総額・分配金をS3経由で登録します。
        バッチはS3にJSONをPUTした後、このエンドポイントにS3キーを渡してください。
        バックエンドがS3からJSONを取得してRDSに書き込みます。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [s3_key, price_date]
              properties:
                s3_key:
                  type: string
                  description: S3バケット内のJSONファイルパス
                  example: fund_prices/2026-03-24.json
                price_date:
                  type: string
                  format: date
                  description: 取得対象日
                  example: '2026-03-24'
            example:
              s3_key: fund_prices/2026-03-24.json
              price_date: '2026-03-24'
      responses:
        '200':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /internal/batch/fx-rates:
    post:
      tags: [internal]
      summary: 為替レート登録
      description: |
        Pythonバッチが取得したUSD/JPY為替レートをS3経由で登録します。
        登録されたレートは GET /fx/latest でフロントエンドに提供されます。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [s3_key, rate_date]
              properties:
                s3_key:
                  type: string
                  description: S3バケット内のJSONファイルパス
                  example: fx_rates/2026-03-25.json
                rate_date:
                  type: string
                  format: date
                  description: 取得対象日
                  example: '2026-03-25'
            example:
              s3_key: fx_rates/2026-03-25.json
              rate_date: '2026-03-25'
      responses:
        '200':
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  usd_jpy:
                    type: number
                    example: 149.5
                  rate_date:
                    type: string
                    format: date
                    example: '2026-03-25'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /internal/stocks/unwatched:
    get:
      tags: [internal]
      summary: 未ウォッチ銘柄一覧取得
      description: |
        watched_tickersに存在しない、またはwatcher_count=0の銘柄一覧を返します。
        X投稿生成バッチ・ニュース生成バッチで「誰も持っていない銘柄」コンテンツに使用します。

        ## 活用例
        - 「誰にも選ばれていない銘柄ランキング」X投稿
        - 「モーリスも首をかしげる銘柄」アプリ内コンテンツ
        - 週次ニュースの「底辺銘柄」ネタ
      security:
        - iamAuth: []
      parameters:
        - name: market
          in: query
          schema:
            type: string
            enum: [JP, US]
          description: 市場区分（省略時は全市場）
        - name: sector_en
          in: query
          schema:
            type: string
          description: セクター英名（省略時は全セクター）
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
          description: 取得件数
        - name: order
          in: query
          schema:
            type: string
            enum: [random, code_asc]
            default: random
          description: 並び順（random=ランダム・code_asc=コード順）
      responses:
        '200':
          description: 未ウォッチ銘柄一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  stocks:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                          example: '1234'
                        name_ja:
                          type: string
                          example: ○○産業
                        sector_en:
                          type: string
                          example: mining
                        watcher_count:
                          type: integer
                          description: 0=誰も保有していない
                          example: 0
                  total_unwatched:
                    type: integer
                    description: 未ウォッチ銘柄の総数
                    example: 8432
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================
  # 統計取得API（バッチ向け・IAM認証）
  # ==========================================

  /internal/stats/users:
    get:
      tags: [stats]
      summary: ユーザー統計取得
      description: |
        Morincum-batchのSlack Bot・ニュース生成・X投稿文生成向けにユーザー統計を提供します。
