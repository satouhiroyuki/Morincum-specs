  /internal/stats/portfolio:
    get:
      tags: [stats]
      summary: ポートフォリオ傾向取得
      description: Morincum-batchのニュース生成・X投稿向けにポートフォリオ傾向データを提供します。
      security:
        - iamAuth: []
      responses:
        '200':
          description: ポートフォリオ傾向
          content:
            application/json:
              schema:
                type: object
                properties:
                  avg_annual_dividend:
                    type: number
                    description: 平均年間配当金（円）
                    example: 125000
                  top_sectors:
                    type: array
                    description: 人気業種TOP5
                    items:
                      type: object
                      properties:
                        sector:
                          type: string
                        percentage:
                          type: number
                  top_asset_types:
                    type: array
                    description: 資産種別割合
                    items:
                      type: object
                      properties:
                        asset_type:
                          type: string
                        percentage:
                          type: number
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================
  # ニュース管理API（バッチ向け・IAM認証）
  # ==========================================

  /internal/news:
    post:
      tags: [news]
      summary: AIニュース保存
      description: |
        Morincum-batchのAIニュース生成バッチが生成したニュースを保存します。
        保存されたニュースは GET /notifications で配信されます。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title_ja, body_ja, title_en, body_en]
              properties:
                title_ja:
                  type: string
                  example: 今月の配当金トレンド
                body_ja:
                  type: string
                  example: 高配当銘柄の保有者が先月比+15%増加しました
                title_en:
                  type: string
                body_en:
                  type: string
                expires_at:
                  type: string
                  format: date-time
                  description: 掲載終了日時（省略時は30日後）
      responses:
        '201':
          description: 保存成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  published_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================
  # X投稿管理API（バッチ向け・IAM認証）
  # ==========================================

  /internal/x-posts:
    post:
      tags: [xposts]
      summary: X投稿下書き保存
      description: Morincum-batchのX投稿文生成バッチが生成した下書きを保存します。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category, content]
              properties:
                category:
                  type: string
                  enum: [stats, maintenance, tips]
                content:
                  type: string
                  description: 投稿文（140文字以内）
                  maxLength: 140
      responses:
        '201':
          description: 保存成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: draft
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /internal/x-posts/latest:
    get:
      tags: [xposts]
      summary: 最新X投稿下書き取得
      description: 最新のdraft状態のX投稿を取得します。
      security:
        - iamAuth: []
      responses:
        '200':
          description: 最新下書き
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPost'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /internal/x-posts/{id}/status:
    patch:
      tags: [xposts]
      summary: X投稿ステータス更新
      description: X投稿のステータスを更新します（承認・却下・投稿完了など）。
      security:
        - iamAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [approved, rejected, posted, skipped]
                x_post_id:
                  type: string
                  description: X APIが返したポストID（status=postedのとき）
                reviewed_by:
                  type: string
                  description: SlackユーザーID
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XPost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================
  # お知らせ・メンテナンス管理API（バッチ向け・IAM認証）
  # ==========================================

  /internal/announcements:
    post:
      tags: [internal]
      summary: お知らせ登録
      description: Morincum-batchのSlackコマンド（/announcement create）からお知らせを登録します。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title_ja, body_ja, title_en, body_en]
              properties:
                title_ja:
                  type: string
                body_ja:
                  type: string
                title_en:
                  type: string
                body_en:
                  type: string
                publish_at:
                  type: string
                  format: date-time
                  description: 公開日時（省略時は即時公開）
                expires_at:
                  type: string
                  format: date-time
                created_by:
                  type: string
                  description: SlackユーザーID
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  published_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /internal/maintenances:
    post:
      tags: [internal]
      summary: メンテナンス登録・更新
      description: |
        Morincum-batchのSlackコマンド（/maintenance）からメンテナンス情報を登録します。
        typeに応じて処理が変わります。
      security:
        - iamAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [create, incident, resolve]
                  description: create=予告登録 / incident=障害通知 / resolve=完了
                title_ja:
                  type: string
                title_en:
                  type: string
                message_ja:
                  type: string
                message_en:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                  description: 開始日時（action=createのとき必須）
                ends_at:
                  type: string
                  format: date-time
                  description: 終了日時（action=createのとき必須）
                maintenance_id:
                  type: string
                  format: uuid
                  description: 対象メンテナンスID（action=resolveのとき必須）
                created_by:
                  type: string
                  description: SlackユーザーID
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: upcoming
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================
  # 行動ログ送信
  # ==========================================

  /logs/events:
    post:
      tags: [logs]
      summary: 行動ログ送信
      description: |
        アプリの行動ログをバッチで送信します。
        以下のタイミングでまとめて送信してください。
        - 20件溜まったとき
        - アプリがバックグラウンドに移ったとき
        - 30秒ごとの定期送信
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/LogEvent'
      responses:
        '202':
          description: ログ受付成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    description: 受け付けたイベント数
                    example: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

# ==========================================
# 共通コンポーネント
# ==========================================

components:
  securitySchemes:
    cognitoAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cognito JWTアクセストークン。
        ログイン済みユーザー向け。全エンドポイントで使用可能。
    guestAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cognito Identity Poolが発行する匿名トークン。
        未ログインユーザー向け。アプリ起動時に自動発行。
        stocks系エンドポイントのみアクセス可能。
    iamAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        AWS SigV4署名による認証。
        LambdaのIAMロールに execute-api:Invoke 権限を付与して使用します。
        VPC内通信専用のため、インターネットからはアクセスできません。

  parameters:
    locale:
      name: locale
      in: query
      description: 言語設定
      schema:
        type: string
        enum: [ja, en]
        default: ja

  responses:
    BadRequest:
      description: リクエストが不正です
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 認証が必要です
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: リソースが見つかりません
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: 既に存在します
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: アクセス権限がありません（IAM認証失敗）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: |
        データのバリデーションエラー。
        S3ファイルの形式不正・必須フィールド欠損・異常値などが該当します。
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: VALIDATION_ERROR
                  message:
                    type: string
                    example: データのバリデーションに失敗しました
                  details:
                    type: array
                    description: バリデーションエラーの詳細
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: close_price
                        reason:
                          type: string
                          example: 負の値は許可されていません
    InternalServerError:
      description: サーバー内部エラー（S3取得失敗・RDS書き込み失敗など）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: メンテナンス中
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_REQUEST
            message:
              type: string
              example: リクエストの形式が正しくありません

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
          description: アクセストークン（有効期限1時間）
        refresh_token:
          type: string
          description: リフレッシュトークン（有効期限30日）
        id_token:
          type: string
          description: IDトークン（ユーザー情報を含む）
        expires_in:
          type: integer
          description: アクセストークンの有効期限（秒）
          example: 3600

    MfaChallenge:
      type: object
      properties:
        challenge_type:
          type: string
          enum: [TOTP]
        session:
          type: string
          description: MFA検証に使用するセッショントークン

    UserPlan:
      type: object
      properties:
        plan_id:
          type: string
          enum: [free, standard]
          description: |
            現在のプランID。
            - `free`: 無料ユーザー（is_premium = false）
            - `standard`: 有料ユーザー（is_premium = true）
          example: free
        has_shown_downgrade_message:
          type: boolean
          description: ダウングレード通知モーダルを表示済みかどうか
          example: false

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: CognitoのsubがそのままIDになります
        email:
          type: string
          format: email
        age_range:
          type: string
          enum: [10代, 20代, 30代, 40代, 50代, 60代以上]
          nullable: true
        investment_experience:
          type: string
          enum: [1年未満, 1〜3年, 3〜5年, 5〜10年, 10年以上]
          nullable: true
        preferred_locale:
          type: string
          enum: [ja, en]
        plan_id:
          type: string
          description: |
            現在のプランID。RevenueCat Webhookで更新されます。
            - `free`: 無料ユーザー（AdMob広告あり）
            - `standard`: Standardプラン（広告なし）
          example: free
        created_at:
          type: string
          format: date-time

    PortfolioSummary:
      type: object
      properties:
        total_annual_dividend:
          type: number
          description: 年間配当金合計（円）
          example: 150000
        sector_breakdown:
          type: object
          description: 業界別割合（%）
          example:
            金融: 35
            テック: 25
            商社: 20
            娯楽: 20
        asset_type_breakdown:
          type: object
          description: 資産種別割合（%）
          example:
            日本株: 50
            米国株: 30
            投資信託: 20
        recorded_month:
          type: string
          format: date
          example: '2026-03-01'
        updated_at:
          type: string
          format: date-time

    Survey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: 投資スタイルアンケート
        version:
          type: string
          example: v1.0
        questions:
          type: array
          items:
            $ref: '#/components/schemas/SurveyQuestion'

    SurveyQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question_text:
          type: string
          example: 投資歴を教えてください
        question_type:
          type: string
          enum: [single, multi, free_text]
        sort_order:
          type: integer
        options:
          type: array
          description: single・multi の場合の選択肢
          items:
            type: string
          example: [1年未満, 1〜3年, 3〜5年, 5年以上]

    Terms:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
          example: v1.2
        type:
          type: string
          enum: [terms, policy, disclaimer]
          description: |
            - terms: 利用規約（フロントの legal_agreements.terms_version と対応）
            - policy: プライバシーポリシー（フロントの legal_agreements.policy_version と対応）
            - disclaimer: 免責事項（株価データの非公式性・投資判断の自己責任）
          example: terms
        title:
          type: string
          example: 利用規約
        content:
          type: string
          description: 規約本文
        s3_url:
          type: string
          description: PDF版のS3 URL
          example: https://s3.ap-northeast-1.amazonaws.com/morincum-assets/terms/v1.2/ja.pdf
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [maintenance, news, announcement]
          description: |
            - maintenance: メンテナンス情報
            - news: AIが生成した統計ニュース
            - announcement: 運営からのお知らせ
        title:
          type: string
          example: 今週の配当金トレンド
        body:
          type: string
          example: 高配当銘柄の保有者が先月比+15%増加しました
        published_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true

    MaintenanceStatus:
      type: object
      properties:
        active:
          type: boolean
          example: false
        type:
          type: string
          enum: [scheduled, incident]
          nullable: true
        status:
          type: string
          enum: [upcoming, active, resolved]
          nullable: true
        title:
          type: string
          nullable: true
          example: 定期メンテナンス
        message:
          type: string
          nullable: true
          example: メンテナンスを実施しています。終了予定：04:00
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true

    Sector:
      type: object
      properties:
        id:
          type: integer
          example: 27
        market:
          type: string
          enum: [JP, US]
          example: JP
        sector_en:
          type: string
          description: バッチ・API用の英名
          example: wholesale_trade
        sector_ja:
          type: string
          description: 表示用の日本語名
          example: 卸売業

    Stock:
      type: object
      properties:
        ticker:
          type: string
          example: '8058'
        name_ja:
          type: string
          description: 銘柄名（日本語）。米国株はカタカナ表記
          example: 三菱商事
        name_en:
          type: string
          nullable: true
          description: 銘柄名（英語）。米国株のみ設定。日本株・投資信託は null
          example: null
        asset_type:
          type: string
          enum: [日本株, 米国株, 投資信託]
          description: フロントエンドの securities_master.type と対応
          example: 日本株
        country:
          type: string
          enum: [日本, アメリカ]
          description: フロントエンドの securities_master.country と対応
          example: 日本
        market:
          type: string
          enum: [TSE, NYSE, NASDAQ]
          example: TSE
        sector:
          type: object
          description: セクター情報
          properties:
            id:
              type: integer
              example: 27
            sector_en:
              type: string
              description: バッチ・API用の英名
              example: wholesale_trade
            sector_ja:
              type: string
              description: 表示用の日本語名
              example: 卸売業
        currency:
          type: string
          enum: [JPY, USD]
          example: JPY
        nisa_growth_start:
          type: string
          format: date
          nullable: true
          description: NISA成長投資枠取扱開始日。対象外の場合はnull
          example: '2024-01-01'
        nisa_tsumitate:
          type: boolean
          description: NISAつみたて投資枠対象フラグ
          example: false
        updated_at:
          type: string
          format: date-time
          description: バックエンドマスタの更新日時。差分同期（updated_afterパラメータ）の基準となる日時
          example: '2026-04-01T09:00:00Z'

    StockDetail:
      allOf:
        - $ref: '#/components/schemas/Stock'
        - type: object
          properties:
            latest_dividend:
              $ref: '#/components/schemas/StockDividend'
            latest_benefit:
              $ref: '#/components/schemas/StockBenefit'

    StockDividend:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          description: 1株あたり配当金
          example: 140
        currency:
          type: string
          enum: [JPY, USD]
        ex_dividend_date:
          type: string
          format: date
          description: 権利落ち日
          example: '2026-03-28'
        payment_date:
          type: string
          format: date
          description: 支払日
          example: '2026-06-10'
        fiscal_period:
          type: string
          example: 2025Q4

    StockBenefit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        record_date:
          type: string
          format: date
          description: 権利確定日
          example: '2026-03-31'
        fiscal_period:
          type: string
          example: 2025Q4
        tiers:
          type: array
          description: 株数別の優待内容
          items:
            $ref: '#/components/schemas/BenefitTier'

    BenefitTier:
      type: object
      properties:
        min_shares:
          type: integer
          description: 必要最低株数
          example: 100
        benefit_type:
          type: string
          example: 食品
        estimated_value:
          type: number
          description: 推定金額（円）
          example: 3000
        description:
          type: string
          description: 優待内容の説明
          example: カタログギフト（3,000円相当）

    StockPrice:
      type: object
      properties:
        date:
          type: string
          format: date
          description: 取引日
          example: '2026-03-24'
        open:
          type: number
          description: 始値
          example: 3200
        high:
          type: number
          description: 高値
          example: 3280
        low:
          type: number
          description: 安値
          example: 3190
        close:
          type: number
          description: 終値
          example: 3240
        adjusted_close:
          type: number
          description: 調整済み終値（株式分割・配当考慮）
          example: 3240
        volume:
          type: integer
          description: 出来高
          example: 1250000

    StockPriceLatest:
      type: object
      properties:
        ticker:
          type: string
          example: '8058'
        date:
          type: string
          format: date
          description: 最終取引日
          example: '2026-03-24'
        close:
          type: number
          description: 最新終値
          example: 3240
        change_amount:
          type: number
          description: 前日比（円・ドル）
          example: 45
        change_percent:
          type: number
          description: 前日比（%）
          example: 1.41
        currency:
          type: string
          enum: [JPY, USD]
          example: JPY
        updated_at:
          type: string
          format: date-time

    XPost:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
          enum: [stats, maintenance, tips]
        content:
          type: string
        status:
          type: string
          enum: [draft, approved, rejected, posted, skipped]
        generated_at:
          type: string
          format: date-time
        reviewed_by:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        posted_at:
          type: string
          format: date-time
          nullable: true
        x_post_id:
          type: string
          nullable: true

    AppVersionLatest:
      type: object
      required: [latest_version, min_required_version, store_url_ios, store_url_android]
      properties:
        latest_version:
          type: string
          description: 現在の最新バージョン番号
          example: '1.1.0'
        min_required_version:
          type: string
          description: 強制アップデートを要求する最低バージョン（これを下回る場合に強制アップデート）
          example: '1.0.0'
        store_url_ios:
          type: string
          description: iOS App Store の URL
          example: 'https://apps.apple.com/app/morincum/id0000000000'
        store_url_android:
          type: string
          description: Google Play Store の URL
          example: 'https://play.google.com/store/apps/details?id=com.morincum'

    AppVersion:
      type: object
      required: [version, os, release_date, min_required_version]
      properties:
        version:
          type: string
          description: バージョン番号
          example: '1.2.0'
        os:
          type: string
          enum: [ios, android, all]
          description: 対象OS
          example: ios
        release_date:
          type: string
          format: date
          description: アップデート日（YYYY-MM-DD）
          example: '2026-03-30'
        min_required_version:
          type: string
          description: 強制アップデートを要求する最低バージョン（これを下回る場合に強制アップデート）
          example: '1.0.0'

    BatchResult:
      type: object
      properties:
        accepted:
          type: integer
          description: 正常に登録されたレコード数
          example: 2150
        skipped:
          type: integer
          description: 重複によりスキップされたレコード数
          example: 3
        failed:
          type: integer
          description: バリデーションエラー等で登録失敗したレコード数
          example: 0
        s3_key:
          type: string
          description: 処理したS3ファイルパス
          example: prices/2026-03-24.json
        archived_s3_key:
          type: string
          description: アーカイブ後のS3ファイルパス
          example: archive/prices/2026-03-24.json
        processed_at:
          type: string
          format: date-time
          description: 処理完了日時
          example: '2026-03-24T16:35:12Z'

    LogEvent:
      type: object
      required: [event_id, event_type, timestamp]
      properties:
        event_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [page_view, button_tap, error, performance]
        timestamp:
          type: string
          format: date-time
        platform:
          type: string
          enum: [ios, android]
        app_version:
          type: string
          example: 1.2.0
        properties:
          type: object
          description: |
            イベント種別ごとの追加データ
            - page_view: screen_name, previous_screen, duration_ms
            - button_tap: button_id, screen_name
            - error: error_code, error_message, stack_trace, is_crash
            - performance: screen_name, load_time_ms, api_latency_ms
          example:
            screen_name: portfolio
            previous_screen: home
            duration_ms: 3200
